<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遊戲入口</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f4f9; }
        .btn { padding: 20px 40px; background: #007AFF; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <a href="#" id="gameLink" class="btn">開啟遊戲</a>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code') || '';
        
        // 這裡我們手動拼湊連結，避免被自動編碼
        const baseUrl = "gameplapp://gameplhost/deeplink";
        const finalLink = `${baseUrl}?type=1&action=web&code=${code}`;
        
        // 設定到按鈕
        document.getElementById('gameLink').href = finalLink;

        window.location.href = finalLink;
    </script>
</body>
</html>
