<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遊戲入口</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f4f9; }
        .btn { padding: 20px 40px; background: #007AFF; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <a href="#" id="gameLink" class="btn">開啟遊戲</a>

    <script>
        // 1. 取得當前網址後的參數 (例如 ?code=A123)
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code') || ''; // 如果沒輸入 code，預設為空

        // 2. 自動組合你的完整 Deep Link
        const finalLink = `gameplapp://gameplhost/deeplink?type=1&action=web&code=${code}`;
        
        // 3. 把連結套用到按鈕上
        document.getElementById('gameLink').href = finalLink;
        
        // (選用) 如果你想讓頁面打開後自動跳轉，可取消下方註解：
         window.location.href = finalLink;
    </script>
</body>
</html>
